#wrap {

  min-height: 100vh;
  gap: 10px;
  padding: 12px;

  border: 3px solid #445;

  max-width: 100%;

  touch-action: none;
}
#help {
  font-size: 13px;
  color: #889;
  text-align: center;
  max-width: 640px;
  line-height: 1.6;
}

    constructor(update, render) {
      this.update = update;

      this.last = 0;
      this.acc = 0;
      this.step = 1e3 / 60;
      this.running = false;
      this._loop = this._loop.bind(this);
    }
    start() {
      this.running = true;
      this.last = performance.now();
      requestAnimationFrame(this._loop);
    }
    _loop(now) {
      if (!this.running) return;
      let delta = now - this.last;
      this.last = now;
      if (delta > 100) delta = 100;
      this.acc += delta;
      let steps = 0;
      while (this.acc >= this.step && steps < 5) {
        this.update(this.step, this.frame);
        this.frame++;
        this.acc -= this.step;
        steps++;
      }
      this.render();
      requestAnimationFrame(this._loop);
    }
  };

    }

        env.gain.setValueAtTime(1e-4, start);
        env.gain.linearRampToValueAtTime(peak, start + 3e-3);
        env.gain.exponentialRampToValueAtTime(1e-4, start + dur);

        ArrowDown: "down",
        KeyS: "down",
        ArrowLeft: "left",
        KeyA: "left",
        ArrowRight: "right",
        KeyD: "right",
        Enter: "confirm",
        Space: "confirm",
        KeyZ: "confirm",
        Escape: "cancel",
        KeyX: "cancel",

          e.preventDefault();
          return;
        }
        const b = map[e.code];
        if (b) {

            this.pressed[b] = true;
            this._queue.push(b);
          }
          this.held[b] = true;
          e.preventDefault();

        BGM.resume();
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;
        this.pointer = { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
      };
      canvas.addEventListener("mousedown", (e) => {
        handleClick(e.clientX, e.clientY);
      });

        if (e.touches[0]) {

  var LEVELS = [];
  (function build() {
    let exp = 0;
    for (let lv = 1; lv <= 30; lv++) {
      if (lv === 1) exp = 0;
      else {
        const inc = Math.floor(7 * Math.pow(lv - 1, 1.85)) + (lv - 1) * 4;
        exp += inc;
      }
      const maxHp = 18 + Math.floor((lv - 1) * 7.2) + Math.floor(Math.pow(lv, 1.4));
      const maxMp = lv < 3 ? 0 : 4 + Math.floor((lv - 3) * 4);
      const str = 4 + Math.floor((lv - 1) * 3.4);
      const agi = 4 + Math.floor((lv - 1) * 2.6);
      LEVELS.push({ lv, exp, maxHp, maxMp: Math.max(0, maxMp), str, agi });
    }
  })();
  function levelForExp(totalExp) {
    let lv = 1;

  }

    return LEVELS[Math.min(lv, 30) - 1];

      const newLv = levelForExp(this.exp);
      const ups = [];
      while (this.lv < newLv) {
        this.lv++;
        const s = statsForLevel(this.lv);
        const dHp = s.maxHp - this.maxHp;
        const dMp = s.maxMp - this.maxMp;
        this.maxHp = s.maxHp;
        this.maxMp = s.maxMp;
        this.str = s.str;
        this.agi = s.agi;
        this.hp = Math.min(this.maxHp, this.hp + dHp);
        this.mp = Math.min(this.maxMp, this.mp + dMp);
        const learned = SPELL_LEARN[this.lv];
        if (learned && !this.spells.includes(learned)) this.spells.push(learned);
        ups.push({ lv: this.lv, learned });
      }
      return ups;
    }
    expToNext() {
      return expToNext(this.exp);
    }
    addItem(id, qty = 1) {
      const it = getItem(id);
      if (!it) return false;
      if (it.consumable) {
        const slot = this.items.find((s) => s.id === id);
        if (slot) slot.qty += qty;
        else this.items.push({ id, qty });
      } else {
        if (!this.items.find((s) => s.id === id)) this.items.push({ id, qty: 1 });
      }
      return true;
    }
    removeItem(id, qty = 1) {
      const idx = this.items.findIndex((s) => s.id === id);
      if (idx < 0) return false;
      this.items[idx].qty -= qty;
      if (this.items[idx].qty <= 0) this.items.splice(idx, 1);
      return true;
    }
    hasItem(id) {
      return this.items.some((s) => s.id === id);
    }
    equip(id) {
      const it = getItem(id);
      if (!it) return false;
      if (it.type === "weapon") this.weapon = id;
      else if (it.type === "armor") this.armor = id;
      else if (it.type === "shield") this.shield = id;
      else return false;
      return true;
    }
    // 現在 weapon/armor/shield のいずれかに装備中か
    isEquipped(id) {
      return this.weapon === id || this.armor === id || this.shield === id;
    }
    // 装備解除：該当スロットを null に（武器→素手 / 防具・盾→なし）。atk/defは再計算される。
    unequip(id) {
      let changed = false;
      if (this.weapon === id) {
        this.weapon = null;
        changed = true;
      }
      if (this.armor === id) {
        this.armor = null;
        changed = true;
      }
      if (this.shield === id) {
        this.shield = null;
        changed = true;
      }
      return changed;
    }
    heal(n) {
      const before = this.hp;
      this.hp = Math.max(0, Math.min(this.maxHp, this.hp + n));
      return this.hp - before;
    }
    healMp(n) {
      const before = this.mp;
      this.mp = Math.max(0, Math.min(this.maxMp, this.mp + n));
      return this.mp - before;
    }
    fullHeal() {
      this.hp = this.maxHp;
      this.mp = this.maxMp;
    }
    // ダメージ適用：HPは0未満にならないようクランプ。実際に減った量を返す。
    takeDamage(n) {
      const before = this.hp;
      this.hp = Math.max(0, this.hp - Math.max(0, n));
      return before - this.hp;
    }
    spendMp(n) {
      const before = this.mp;
      this.mp = Math.max(0, this.mp - Math.max(0, n));
      return before - this.mp;
    }
    isDead() {
      return this.hp <= 0;
    }
    // セーブ用シリアライズ
    toJSON() {
      return {
        name: this.name,
        lv: this.lv,
        exp: this.exp,
        maxHp: this.maxHp,
        hp: this.hp,
        maxMp: this.maxMp,

        armor: this.armor,
        shield: this.shield,
        items: this.items,
        spells: this.spells,
        pos: this.pos,
        flags: this.flags
      };
    }
    static fromJSON(d) {
      const p = new _Player(d.name);
      Object.assign(p, d);
      p.pos = Object.assign({ map: "castle", x: 7, y: 11, dir: "up" }, d.pos || {});
      p.flags = Object.assign({ metKing: false, gotKey: false, savedPrincess: false, galdisDefeated: false, bridgeSolved: false }, d.flags || {});
      p.items = Array.isArray(d.items) ? d.items : [];
      p.spells = Array.isArray(d.spells) ? d.spells : [];
      p.exp = Number.isFinite(d.exp) ? d.exp : 0;
      p.lv = Math.max(1, Math.min(30, levelForExp(p.exp)));
      const s = statsForLevel(p.lv);
      const prevMaxHp = Number.isFinite(d.maxHp) ? d.maxHp : s.maxHp;
      const prevMaxMp = Number.isFinite(d.maxMp) ? d.maxMp : s.maxMp;
      const wasFullHp = Number.isFinite(d.hp) && d.hp >= prevMaxHp;
      const wasFullMp = Number.isFinite(d.mp) && d.mp >= prevMaxMp;
      p.maxHp = s.maxHp;
      p.maxMp = s.maxMp;
      p.str = s.str;
      p.agi = s.agi;
      p.hp = wasFullHp ? p.maxHp : Math.max(1, Math.min(p.maxHp, Number.isFinite(d.hp) ? d.hp : p.maxHp));
      p.mp = wasFullMp ? p.maxMp : Math.max(0, Math.min(p.maxMp, Number.isFinite(d.mp) ? d.mp : p.maxMp));
      for (let lv = 1; lv <= p.lv; lv++) {
        const learned = SPELL_LEARN[lv];
        if (learned && !p.spells.includes(learned)) p.spells.push(learned);
      }
      return p;
    }
  };

  var TILE = 32;
  function renderMap(ctx, mapKey, camX, camY, viewW, viewH, player, frame) {
    const m = MAPS[mapKey];
    if (!m) return;
    const cols = m.tiles[0].length, rows = m.tiles.length;
    const startCol = Math.max(0, Math.floor(camX / TILE));
    const endCol = Math.min(cols - 1, Math.floor((camX + viewW) / TILE));
    const startRow = Math.max(0, Math.floor(camY / TILE));
    const endRow = Math.min(rows - 1, Math.floor((camY + viewH) / TILE));
    for (let r = startRow; r <= endRow; r++) {
      for (let c = startCol; c <= endCol; c++) {
        const ch = m.tiles[r][c];
        const def = TILE_DEF[ch] || { kind: "grass" };
        const px = c * TILE - camX, py = r * TILE - camY;
        if (["stairsDown", "stairsUp", "door", "chest", "sign", "throne"].includes(def.kind)) {
          const baseKind = mapKey === "cave" || mapKey === "caveInner" || mapKey === "castle" || mapKey === "darkCastle" ? "floor" : "grass";
          drawTile(ctx, baseKind, px, py, TILE);
        }
        drawTile(ctx, def.kind, px, py, TILE);
      }
    }
    for (const npc of npcsOnMap(mapKey)) {
      if (npc.sprite === "princess" && player.flags.savedPrincess) continue;
      const px = npc.x * TILE - camX, py = npc.y * TILE - camY;
      if (px < -TILE || px > viewW || py < -TILE || py > viewH) continue;
      drawSprite(ctx, npc.sprite, npc.dir, px, py, TILE);
    }
  }
  function computeCamera(mapKey, playerX, playerY, viewW, viewH) {
    const m = MAPS[mapKey];
    const mapW = m.tiles[0].length * TILE, mapH = m.tiles.length * TILE;
    let camX = playerX * TILE + TILE / 2 - viewW / 2;
    let camY = playerY * TILE + TILE / 2 - viewH / 2;
    camX = Math.max(0, Math.min(camX, Math.max(0, mapW - viewW)));
    camY = Math.max(0, Math.min(camY, Math.max(0, mapH - viewH)));
    if (mapW < viewW) camX = (mapW - viewW) / 2;
    if (mapH < viewH) camY = (mapH - viewH) / 2;
    return { camX, camY };
  }

  function rint(min, max) {

  function physicalDamage(atk, def) {

    let dmg = rint(Math.min(min, max), Math.max(min, max));
    if (dmg < 1) dmg = base2 > 0 ? 1 : 0;

  var MSG_FONT = '20px "MS Gothic", monospace';

    _wrapText(ctx, text, maxWidth) {

          if (lineW + cw > maxWidth && line.length > 0) {
            out.push(line);
            line = chFromText;
            lineW = cw;

            lineW += cw;

      }

    _paginate(ctx, text, maxWidth, maxLines) {

      const pages = [];
      for (let i = 0; i < lines.length; i += maxLines) {

      this.player = game.player;
      this.enemy = getEnemy(enemyId);
      this.enemyMaxHp = this.enemy.hp;
      this.isBoss = !!this.enemy.boss;
      this.fleeable = this.enemy.fleeable !== false && !this.isBoss ? true : this.enemy.fleeable === true;
      this.opts = opts;
      this.phase = "intro";
      this.commandIndex = 0;
      this.commands = ["たたかう", "じゅもん", "どうぐ", "にげる"];
      this.submenu = null;
      this.msgQueue = [];
      this.shakeTimer = 0;
      this.enemyHurtTimer = 0;
      this.flashTimer = 0;
      this.battleOver = false;
      this.result = null;
      const grp = this.isBoss ? this.enemy.name : this.enemy.name;
      this.pushMsg(STR.battle.appear(grp));
      this.phase = "message";
      const enemyFirst = !this.isBoss && !playerFirst(this.player.agi, this.enemy.agi);
      this.afterMessage = enemyFirst ? () => {
        this.pushMsg("てきに せんせいを とられた！");
        this.phase = "message";
        this.afterMessage = () => this._enemyTurn();
      } : () => {
        this.phase = "command";
      };
    }
    pushMsg(text) {
      this.msgQueue.push(text);
    }
    // ===== 入力処理 =====
    handleInput(buttons, pointer) {
      if (this.phase === "message") {
        if (buttons.includes("confirm") || buttons.includes("cancel") || pointer) {
          this._advanceMessage();
        }
        return;
      }
      if (this.phase === "command") {
        if (buttons.includes("up")) this.commandIndex = (this.commandIndex + 2) % 4;
        if (buttons.includes("down")) this.commandIndex = (this.commandIndex + 2) % 4;
        if (buttons.includes("left")) this.commandIndex = this.commandIndex % 2 === 1 ? this.commandIndex - 1 : this.commandIndex + 1;
        if (buttons.includes("right")) this.commandIndex = this.commandIndex % 2 === 0 ? this.commandIndex + 1 : this.commandIndex - 1;
        if (buttons.includes("confirm")) this._chooseCommand(this.commandIndex);
        return;
      }
      if (this.phase === "submenu") {
        const n = this.submenu.list.length;
        if (buttons.includes("up")) this.submenu.index = (this.submenu.index - 1 + n) % n;
        if (buttons.includes("down")) this.submenu.index = (this.submenu.index + 1) % n;
        if (buttons.includes("cancel")) {
          this.phase = "command";
          this.submenu = null;
        }
        if (buttons.includes("confirm")) this._chooseSub();
        return;
      }
    }
    _advanceMessage() {
      this.msgQueue.shift();
      if (this.msgQueue.length === 0) {
        const cb = this.afterMessage;
        this.afterMessage = null;
        this.phase = "command";
        if (cb) cb();
      }
    }
    _chooseCommand(idx) {
      if (idx === 0) {
        this._playerAttack();
      } else if (idx === 1) {
        this._openSpells();
      } else if (idx === 2) {
        this._openItems();
      } else if (idx === 3) {
        this._playerFlee();
      }
    }
    _openSpells() {
      const usable = this.player.spells.map((id) => getSpell(id)).filter((s) => s.battleOnly || s.kind === "heal");
      if (usable.length === 0) {
        this.msgQueue = [STR.menu.emptySpells];
        this.phase = "message";
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      this.submenu = { type: "spell", list: usable, index: 0 };
      this.phase = "submenu";
    }
    _openItems() {
      const usable = this.player.items.map((s) => ({ ...s, def: getItem(s.id) })).filter((s) => s.def && s.def.type === "useItem");
      if (usable.length === 0) {
        this.msgQueue = [STR.menu.emptyItems];
        this.phase = "message";
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      this.submenu = { type: "item", list: usable, index: 0 };
      this.phase = "submenu";
    }
    _chooseSub() {
      const sel = this.submenu.list[this.submenu.index];
      if (this.submenu.type === "spell") {
        this._castSpell(sel);
      } else {
        this._useItem(sel);
      }
    }
    // ===== プレイヤー行動 → 敵行動 のターン処理 =====
    _playerAttack() {
      const p = this.player, e = this.enemy;
      const msgs = [STR.battle.attack(p.name)];
      if (isHit(p.agi, e.agi)) {
        const dmg = physicalDamage(p.atk, e.def);
        e.hp = Math.max(0, e.hp - dmg);
        msgs.push(STR.battle.damage(e.name, dmg));
        this.enemyHurtTimer = 18;
        this.shakeTimer = 12;
      } else {
        msgs.push(STR.battle.miss(e.name));
      }
      this._runTurn(msgs);
    }
    _castSpell(spell) {
      const p = this.player;
      if (p.mp < spell.mp) {
        this.submenu = null;
        this.phase = "message";
        this.msgQueue = [STR.battle.noMp];
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      p.spendMp(spell.mp);
      this.submenu = null;
      const msgs = [STR.battle.castSpell(p.name, spell.name)];
      if (spell.kind === "attack") {
        const dmg = spellDamage(spell.power, spell.variance);
        this.enemy.hp = Math.max(0, this.enemy.hp - dmg);
        msgs.push(STR.battle.spellDamage(this.enemy.name, dmg));
        this.enemyHurtTimer = 18;
        this.shakeTimer = 12;
        this.flashTimer = 10;
      } else if (spell.kind === "heal") {
        const amt = healAmount(spell.power, spell.variance);
        const healed = p.heal(amt);
        msgs.push(STR.battle.healSpell(healed));
      }
      this._runTurn(msgs);
    }
    _useItem(slot) {
      const p = this.player;
      const def = slot.def;
      this.submenu = null;
      if (def.heal && p.hp >= p.maxHp) {
        this.msgQueue = ["HPは まんたんだ。"];
        this.phase = "message";
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      if (def.healMp && p.mp >= p.maxMp) {
        this.msgQueue = ["MPは まんたんだ。"];
        this.phase = "message";
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      const msgs = [STR.battle.useItem(p.name, def.name)];
      if (def.heal) {
        const h = p.heal(def.heal);
        msgs.push(STR.battle.itemHeal(h));
      } else if (def.healMp) {
        const m = p.healMp(def.healMp);
        msgs.push(`MPが ${m} かいふくした！`);
      }
      if (def.consumable) p.removeItem(def.id, 1);
      this._runTurn(msgs);
    }
    _playerFlee() {
      if (!this.fleeable) {
        this.msgQueue = ["にげられない！"];
        this.phase = "message";
        this.afterMessage = () => {
          this.phase = "command";
        };
        return;
      }
      if (canFlee(this.player.agi, this.enemy.agi)) {
        this.msgQueue = [STR.battle.fledOK];
        this.phase = "message";
        this.result = "flee";
        this.battleOver = true;
        this.afterMessage = () => this._end();
      } else {
        this._runTurn([STR.battle.fledNG]);
      }
    }
    // ターン進行：プレイヤーメッセージ → 敵生存チェック → 敵行動
    _runTurn(playerMsgs) {
      this.msgQueue = playerMsgs.slice();
      this.phase = "message";
      this.afterMessage = () => {
        if (this.enemy.hp <= 0) {
          this._enemyDefeated();
          return;
        }
        this._enemyTurn();
      };
    }
    _enemyTurn() {
      const e = this.enemy, p = this.player;
      const msgs = [];
      let usedSpell = false;
      if (e.spells && e.spells.length > 0 && Math.random() < 0.35) {
        const sid = e.spells[Math.floor(Math.random() * e.spells.length)];
        const sp = getSpell(sid);
        if (sp && sp.kind === "attack") {
          const dmg = spellDamage(sp.power, sp.variance);
          p.takeDamage(dmg);
          msgs.push(STR.battle.castSpell(e.name, sp.name));
          msgs.push(STR.battle.playerHurt(dmg));
          this.shakeTimer = 14;
          this.flashTimer = 10;
          usedSpell = true;
        }
      }
      if (!usedSpell) {
        msgs.push(STR.battle.enemyTurn(e.name));
        if (isHit(e.agi, p.agi)) {
          const dmg = Math.max(1, physicalDamage(e.atk, p.def));
          p.takeDamage(dmg);
          msgs.push(STR.battle.playerHurt(dmg));
          this.shakeTimer = 14;
        } else {
          msgs.push("しかし こうげきを かわした！");
        }
      }
      this.msgQueue = msgs;
      this.phase = "message";
      this.afterMessage = () => {
        if (p.hp <= 0) {
          this._playerDefeated();
          return;
        }
        this.phase = "command";
      };
    }
    _enemyDefeated() {
      const e = this.enemy, p = this.player;
      if (e.id === "galdis1") {
        this.msgQueue = [STR.battle.win(e.name), STR.battle.bossPhase];
        this.phase = "message";
        this.afterMessage = () => {
          this.enemy = getEnemy("galdis2");
          this.enemyMaxHp = this.enemy.hp;
          this.phase = "command";
        };
        return;
      }
      const msgs = [STR.battle.win(e.name)];
      const ups = p.addExp(e.exp);
      p.gold += e.gold;
      msgs.push(STR.battle.expGold(e.exp, e.gold));
      for (const u of ups) {
        msgs.push(STR.battle.levelUp(u.lv));
        if (u.learned) msgs.push(STR.battle.learnSpell(getSpell(u.learned).name));
      }
      this.result = "win";
      this.battleOver = true;
      this.msgQueue = msgs;
      this.phase = "message";
      this.afterMessage = () => this._end();
    }
    _playerDefeated() {
      this.msgQueue = [STR.battle.death];
      this.phase = "message";
      this.result = "lose";
      this.battleOver = true;
      this.afterMessage = () => this._end();
    }
    _end() {
      this.phase = "done";
      if (this.result === "win" && this.opts.onWin) this.opts.onWin(this.enemy);
      else if (this.result === "lose" && this.opts.onLose) this.opts.onLose();
      else if (this.result === "flee" && this.opts.onFlee) this.opts.onFlee();
    }
    update() {
      if (this.shakeTimer > 0) this.shakeTimer--;
      if (this.enemyHurtTimer > 0) this.enemyHurtTimer--;
      if (this.flashTimer > 0) this.flashTimer--;
    }
    // ===== 描画 =====
    draw(ctx, W, H) {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, this.isBoss ? "#200008" : "#101028");
      grad.addColorStop(1, "#000");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      if (this.flashTimer > 0) {
        ctx.fillStyle = `rgba(255,80,80,${this.flashTimer / 30})`;
        ctx.fillRect(0, 0, W, H);
      }
      let ex = W / 2, ey = H * 0.36;
      if (this.shakeTimer > 0) ex += Math.sin(this.shakeTimer * 1.5) * 6;
      const size = this.isBoss ? 200 : 130;
      ctx.save();
      if (this.enemyHurtTimer > 0 && Math.floor(this.enemyHurtTimer / 3) % 2 === 0) ctx.globalAlpha = 0.4;
      drawEnemy(ctx, this.enemy.color, ex, ey, size);
      ctx.restore();
      ctx.fillStyle = "#fff";
      ctx.font = '20px "MS Gothic", monospace';
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(this.enemy.name, W / 2, 20);
      ctx.textAlign = "left";
      const barW = 220, barX = W / 2 - barW / 2, barY = 48;
      ctx.fillStyle = "#400";
      ctx.fillRect(barX, barY, barW, 10);
      ctx.fillStyle = "#e33";
      ctx.fillRect(barX, barY, barW * Math.max(0, this.enemy.hp) / this.enemyMaxHp, 10);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, 10);
      this._drawStatus(ctx);
      if (this.phase === "message") {
        this._drawMessage(ctx, W, H, this.msgQueue[0] || "");
      } else if (this.phase === "command") {
        this._drawCommands(ctx, W, H);
      } else if (this.phase === "submenu") {
        this._drawSubmenu(ctx, W, H);
      }
    }
    _drawStatus(ctx) {
      const x = 12, y = 12, w = 180, h = 92;
      drawWindow(ctx, x, y, w, h);
      const p = this.player;
      ctx.fillStyle = "#fff";
      ctx.font = '16px "MS Gothic", monospace';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText(p.name, x + 12, y + 10);
      ctx.fillStyle = hpColor(p.hp, p.maxHp);
      ctx.fillText(`HP ${p.hp}/${p.maxHp}`, x + 12, y + 34);
      ctx.fillStyle = "#fff";
      ctx.fillText(`MP ${p.mp}/${p.maxMp}`, x + 12, y + 56);
      ctx.fillText(`Lv ${p.lv}`, x + 120, y + 10);
    }
    _drawMessage(ctx, W, H, text) {
      const x = 16, y = H - 130, w = W - 32, h = 114;
      const padX = 16, innerW = w - padX * 2;
      drawWindow(ctx, x, y, w, h);
      ctx.fillStyle = "#fff";
      ctx.font = '20px "MS Gothic", monospace';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      const lines = [];
      for (const para of String(text).split("\n")) {
        let line = "", lw = 0;
        for (const c of para) {
          const cw = ctx.measureText(c).width;
          if (lw + cw > innerW && line.length > 0) {
            lines.push(line);
            line = c;
            lw = cw;
          } else {
            line += c;
            lw += cw;
          }
        }
        lines.push(line);
      }
      let yy = y + 16;
      for (const l of lines) {
        ctx.fillText(l, x + padX, yy);
        yy += 26;
      }
      if (Math.floor(Date.now() / 400) % 2 === 0) {
        ctx.fillStyle = "#e0d040";
        ctx.fillText("▼", x + w - 32, y + h - 28);
      }
    }
    _drawCommands(ctx, W, H) {
      const x = 16, y = H - 130, w = 260, h = 114;
      drawWindow(ctx, x, y, w, h);
      ctx.font = '20px "MS Gothic", monospace';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      const positions = [[0, 0], [1, 0], [0, 1], [1, 1]];
      this.commands.forEach((cmd, i) => {
        const [cx, cy] = positions[i];
        const ox = x + 20 + cx * 120, oy = y + 22 + cy * 42;
        if (i === this.commandIndex) {
          ctx.fillStyle = "#e0d040";
          ctx.fillText("▶", ox - 18, oy);
        }
        ctx.fillStyle = "#fff";
        ctx.fillText(cmd, ox, oy);
      });
    }
    _drawSubmenu(ctx, W, H) {
      const list = this.submenu.list;
      const x = 16, y = H - 130 - (list.length * 26 + 20), w = 300, h = list.length * 26 + 20;
      drawWindow(ctx, x, y, Math.max(w, 240), h + 8);
      ctx.font = '18px "MS Gothic", monospace';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      list.forEach((it, i) => {
        const oy = y + 12 + i * 26;
        const label = this.submenu.type === "spell" ? `${it.name}  MP${it.mp}` : `${it.def.name}  x${it.qty}`;
        if (i === this.submenu.index) {
          ctx.fillStyle = "#e0d040";
          ctx.fillText("▶", x + 8, oy);
        }
        ctx.fillStyle = "#fff";
        ctx.fillText(label, x + 30, oy);
      });
    }
  };

  // src/ui/menu.js
  var FieldMenu = class {
    constructor(game) {
      this.game = game;
      this.open = false;
      this.index = 0;
      this.commands = [
        STR.menu.talk,
        STR.menu.status,
        STR.menu.items,
        STR.menu.spells,
        STR.menu.equip,
        STR.menu.search,
        STR.menu.save,
        STR.menu.fileOut,
        STR.menu.fileIn,
        STR.menu.close
      ];
      this.sub = null;
    }
    show() {
      this.open = true;
      this.index = 0;
      this.sub = null;
    }
    close() {
      this.open = false;
      this.sub = null;
    }
    // メインコマンドの描画レイアウト（draw と一致させる）
    _mainLayout(W) {
      const mw = 150, mh = this.commands.length * 28 + 20;
      const mx = W - mw - 12, my = 12;
      return { mx, my, mw, mh, itemH: 28, top: my + 12 };
    }
    // リストサブの描画レイアウト
    _listLayout(W, H, n) {
      const w = 320, h = n * 24 + 30, x = (W - w) / 2, y = (H - h) / 2;
      return { x, y, w, h, itemH: 24, top: y + 14 };
    }
    handleInput(buttons, pointer) {
      if (this.sub) {
        this._subInput(buttons, pointer);
        return;
      }
      if (buttons.includes("up")) this.index = (this.index - 1 + this.commands.length) % this.commands.length;
      if (buttons.includes("down")) this.index = (this.index + 1) % this.commands.length;
      if (buttons.includes("cancel") || buttons.includes("menu")) {
        this.close();
        return;
      }
      if (pointer) {
        const W = this.game.W, H = this.game.H;
        const L = this._mainLayout(W);
        if (pointer.x >= L.mx && pointer.x <= L.mx + L.mw) {
          const idx = Math.floor((pointer.y - L.top + 6) / L.itemH);
          if (idx >= 0 && idx < this.commands.length) {
            this.index = idx;
            this._choose(idx);
            return;
          }
        }
        this.close();
        return;
      }
      if (buttons.includes("confirm")) this._choose(this.index);
    }
    _choose(i) {
      const g = this.game;
      switch (i) {
        case 0:
          this.close();
          g.tryTalk();
          break;
        case 1:
          this.sub = { mode: "status" };
          break;
        case 2:
          this._openItems();
          break;
        case 3:
          this._openSpells();
          break;
        case 4:
          this._openEquip();
          break;
        case 5:
          this.close();
          g.trySearch();
          break;
        case 6:
          this.close();
          g.trySaveAtMenu();
          break;
        case 7:
          this.close();
          g.exportSave();
          break;
        case 8:
          this.close();
          g.importSave();
          break;
        case 9:
          this.close();
          break;
      }
    }
    _openItems() {
      const list = this.game.player.items.map((s) => ({ ...s, def: getItem(s.id) })).filter((s) => s.def);
      if (list.length === 0) {
        this.game.msg.show([STR.menu.emptyItems]);
        this.close();
        return;
      }
      this.sub = { mode: "items", list, index: 0 };
    }
    _openSpells() {
      const list = this.game.player.spells.map((id) => getSpell(id)).filter(Boolean);
      if (list.length === 0) {
        this.game.msg.show([STR.menu.emptySpells]);
        this.close();
        return;
      }
      this.sub = { mode: "spells", list, index: 0 };
    }
    _openEquip() {
      const list = this.game.player.items.map((s) => ({ ...s, def: getItem(s.id) })).filter((s) => s.def && ["weapon", "armor", "shield"].includes(s.def.type));
      if (list.length === 0) {
        this.game.msg.show(["そうびできる ものが ない。"]);
        this.close();
        return;
      }
      this.sub = { mode: "equip", list, index: 0 };
    }
    _subInput(buttons, pointer) {
      const s = this.sub;
      if (s.mode === "status") {
        if (buttons.includes("cancel") || buttons.includes("confirm") || pointer) this.sub = null;
        return;
      }
      const n = s.list.length;
      if (buttons.includes("up")) s.index = (s.index - 1 + n) % n;
      if (buttons.includes("down")) s.index = (s.index + 1) % n;
      if (buttons.includes("cancel")) {
        this.sub = null;
        return;
      }
      if (pointer) {
        const L = this._listLayout(this.game.W, this.game.H, n);
        if (pointer.x >= L.x && pointer.x <= L.x + L.w && pointer.y >= L.y && pointer.y <= L.y + L.h) {
          const idx = Math.floor((pointer.y - L.top + 4) / L.itemH);
          if (idx >= 0 && idx < n) {
            s.index = idx;
            this._subChoose();
            return;
          }
        }
        this.sub = null;
        return;
      }
      if (buttons.includes("confirm")) this._subChoose();
    }
    _subChoose() {
      const g = this.game, p = g.player, s = this.sub;
      const sel = s.list[s.index];
      if (s.mode === "items") {
        const def = sel.def;
        if (def.type === "useItem") {
          if (def.heal) {
            if (p.hp >= p.maxHp) {
              g.msg.show(["HPは まんたんだ。"]);
            } else {
              const h = p.heal(def.heal);
              if (def.consumable) p.removeItem(def.id, 1);
              g.msg.show([STR.menu.usedItem(def.name, h)]);
            }
          } else if (def.healMp) {
            if (p.mp >= p.maxMp) {
              g.msg.show(["MPは まんたんだ。"]);
            } else {
              p.healMp(def.healMp);
              if (def.consumable) p.removeItem(def.id, 1);
              g.msg.show([`${def.name}を つかった。
MPが ${def.healMp} かいふくした！`]);
            }
          }
          this.close();
        } else if (["weapon", "armor", "shield"].includes(def.type)) {
          if (p.isEquipped(def.id)) {
            p.unequip(def.id);
            g.msg.show([STR.menu.unequipped(def.name)]);
          } else {
            p.equip(def.id);
            g.msg.show([STR.menu.equipped(def.name)]);
          }
          this.close();
        } else {
          g.msg.show([`${def.name}：${def.desc || ""}`]);
          this.close();
        }
      } else if (s.mode === "equip") {
        if (p.isEquipped(sel.def.id)) {
          p.unequip(sel.def.id);
          g.msg.show([STR.menu.unequipped(sel.def.name)]);
        } else {
          p.equip(sel.def.id);
          g.msg.show([STR.menu.equipped(sel.def.name)]);
        }
        this.close();
      } else if (s.mode === "spells") {
        const sp = sel;
        g.castFieldSpell(sp);
        this.close();
      }
    }

        const ch = tileAt(p.map, p.x, p.y);
        let rate = 0.1;
        if (m.encounter === "cave") rate = 0.13;
        if (m.encounter === "darkCastle") rate = 0.16;
        if (ch === "s" || ch === "T") rate += 0.03;
        if (Math.random() < rate) {
          this._startEncounter();
        }
      }
      if (this.encounterCooldown > 0) this.encounterCooldown--;
    }
    _handleWarp(warp) {
      if (warp.requireKey && !this.player.hasItem(warp.requireKey)) {
        this.msg.show([STR.common.needKey]);
        this._pushBackFromWarp();
        this.sm.set(STATE.EVENT);
        return;
      }
      if (warp.requireFlag && !this.player.flags[warp.requireFlag]) {
        this.msg.show(["まだ ここへは すすめない。\n姫を すくわねば…"]);
        this._pushBackFromWarp();
        this.sm.set(STATE.EVENT);
        return;
      }
      if (warp.requireKey && this.player.hasItem(warp.requireKey)) {
        const flagName = "_unlocked_" + warp.requireKey;
        if (!this.player.flags[flagName]) {
          this.player.flags[flagName] = true;
          this.sm.set(STATE.EVENT);
          this.msg.show([STR.common.unlock], () => {
            this.warpTo(warp.map, warp.x, warp.y, warp.dir);
            this.encounterCooldown = 3;
          });
          return;
        }
      }
      this.warpTo(warp.map, warp.x, warp.y, warp.dir);
      this.encounterCooldown = 3;
    }
    // 奥扉に乗ったが進めないとき、入口側（直前の位置）へ1マス押し戻す
    _pushBackFromWarp() {
      const p = this.player.pos;
      if (this.move) {
        p.x = this.move.fromX;
        p.y = this.move.fromY;
      } else {
        let dx = 0, dy = 0;
        if (p.dir === "up") dy = 1;
        else if (p.dir === "down") dy = -1;
        else if (p.dir === "left") dx = 1;
        else dx = -1;
        const bx = p.x + dx, by = p.y + dy;
        if (isPassable(p.map, bx, by) && !npcAt(p.map, bx, by, this.player)) {
          p.x = bx;
          p.y = by;
        }
      }
      this.move = null;
    }
    warpTo(map, x, y, dir) {
      this.player.pos = { map, x, y, dir: dir || this.player.pos.dir };
      this.flashFx = 12;
    }
    // ===== 調べる/話す =====
    tryTalk() {
      const t = this.facingTile();
      const npc = npcAt(this.player.pos.map, t.x, t.y, this.player);
      if (npc) {
        this.sm.set(STATE.EVENT);
        npc.action(this);
      } else this.msg.show([STR.menu.nothing]);
    }
    trySearch() {
      const p = this.player.pos;
      const key = `${p.map},${p.x},${p.y}`;
      const t = this.facingTile();
      const fkey = `${p.map},${t.x},${t.y}`;
      let chestKey = null;
      if (CHESTS[key] && !this.openedChests.has(key)) chestKey = key;
      else if (CHESTS[fkey] && !this.openedChests.has(fkey)) chestKey = fkey;
      if (!chestKey && tileAt(p.map, t.x, t.y) === "C") {
      }
      if (chestKey) {
        const c = CHESTS[chestKey];
        this.openedChests.add(chestKey);
        if (c.gold) {
          this.player.gold += c.gold;
          this.msg.show([STR.menu.foundGold(c.gold)]);
        } else if (c.item) {
          this.player.addItem(c.item);
          this.msg.show([STR.menu.foundItem(getItem(c.item).name)]);
        }
        return;
      }
      this.msg.show([STR.menu.nothingHere]);
    }
    // ===== 店 =====
    openShop(type) {
      this.shop = new Shop(this, type);
      this.sm.set(STATE.SHOP);
    }
    openInn(place) {
      this.inn = new Inn(this, place);
      this.sm.set(STATE.EVENT);
      this.inn.start();
    }
    // ===== フィールド呪文 =====
    castFieldSpell(sp) {
      const p = this.player;
      if (p.mp < sp.mp) {
        this.msg.show([STR.battle.noMp]);
        return;
      }
      if (sp.kind === "heal") {
        if (p.hp >= p.maxHp) {
          this.msg.show(["HPは まんたんだ。"]);
          return;
        }
        p.mp -= sp.mp;
        const amt = p.heal(sp.power);
        this.msg.show([STR.battle.castSpell(p.name, sp.name), STR.battle.healSpell(amt)]);
      } else if (sp.kind === "teleport") {
        p.mp -= sp.mp;
        this.msg.show([STR.battle.castSpell(p.name, sp.name)], () => this.warpTo("town", 7, 5, "down"));
      } else if (sp.kind === "escape") {
        p.mp -= sp.mp;
        const map = p.pos.map;
        const exits = { cave: ["field", 5, 16], caveInner: ["cave", 1, 1], darkCastle: ["field", 16, 9] };
        const ex = exits[map];
        if (ex) this.msg.show([STR.battle.castSpell(p.name, sp.name)], () => this.warpTo(ex[0], ex[1], ex[2], "down"));
        else this.msg.show([STR.menu.cantUseHere]);
      } else {
        this.msg.show([STR.menu.cantUseHere]);
      }
    }
    // ===== 戦闘 =====
    _startEncounter() {
      const eid = rollEncounter(getMap(this.player.pos.map).encounter);
      if (!eid) return;
      this._beginBattle(eid);
    }
    _beginBattle(eid, isGaldis = false) {
      this.flashFx = 16;
      this.battle = new Battle(this, eid, {
        onWin: (enemy) => this._onBattleWin(enemy),
        onLose: () => this._onBattleLose(),
        onFlee: () => {
          this.sm.set(STATE.FIELD);
          this.encounterCooldown = 4;
          this.battle = null;
        }
      });
      this.sm.set(STATE.BATTLE);
    }
    _onBattleWin(enemy) {
      if (enemy.id === "galdis2") {
        this.player.flags.galdisDefeated = true;
        this.battle = null;
        this._startEnding();
        return;
      }
      this.battle = null;
      this.sm.set(STATE.FIELD);
      this.encounterCooldown = 3;
    }
    _onBattleLose() {
      this.battle = null;
      this.sm.set(STATE.GAMEOVER);
    }
    // 竜王城内のGタイルに踏み込むとボス戦
    _checkBossTrigger() {
      const p = this.player.pos;
      if (p.map === "darkCastle" && tileAt(p.map, p.x, p.y) === "G") {
        if (!this.player.flags.galdisDefeated) {
          this.sm.set(STATE.EVENT);
          this.msg.show(["竜王ガルディスが\n たちふさがった！"], () => this._beginBattle("galdis1", true));
        }
      }
    }
    // ===== ゲームオーバー =====
    reviveAfterGameOver() {
      const p = this.player;
      p.gold = Math.floor(p.gold / 2);
      p.hp = p.maxHp;
      p.mp = p.maxMp;
      p.pos = { map: "castle", x: 6, y: 11, dir: "up" };
      this.sm.set(STATE.EVENT);
      this.msg.show([STR.priest.revive(p.name)], () => this.sm.set(STATE.FIELD));
    }
    // ===== エンディング =====
    _startEnding() {
      this.sm.set(STATE.ENDING);
      this.endingPage = 0;
      this.endingTimer = 0;
      this.endingMsgs = [
        STR.common.ending1,
        STR.common.ending2(this.player.name),
        STR.common.ending3,
        STR.common.endingThanks
      ];
    }
    // ============ UPDATE ============
    update(dt, frame) {
      this.frame = frame;
      const buttons = this.input.consume();
      const pointer = this.input.pointer;
      const stateBefore = this.sm.state;
      const msgBefore = this.msg.active;
      this.msg.update();
      switch (this.sm.state) {
        case STATE.TITLE:
          this._updateTitle(buttons, pointer);
          break;
        case STATE.NAME:
          this._updateName(buttons);
          break;
        case STATE.FIELD:
          this._updateField(buttons, pointer);
          break;
        case STATE.EVENT:
          this._updateEvent(buttons, pointer);
          break;
        case STATE.MENU:
          this._updateMenu(buttons, pointer);
          break;
        case STATE.SHOP:
          this._updateShop(buttons, pointer);
          break;
        case STATE.BATTLE:
          this._updateBattle(buttons, pointer);
          break;
        case STATE.GAMEOVER:
          this._updateGameOver(buttons, pointer);
          break;
        case STATE.ENDING:
          this._updateEnding(buttons, pointer);
          break;
      }
      if (this.sm.state !== stateBefore || this.msg.active !== msgBefore) {
        this.input.flush();
      }
      if (this.flashFx > 0) this.flashFx--;
      this._updateBGM();
      this.input.endFrame();
    }
    _updateBGM() {
      let track = null;
      switch (this.sm.state) {
        case STATE.TITLE:
        case STATE.NAME:
          track = "title";
          break;
        case STATE.ENDING:
          track = "ending";
          break;
        case STATE.GAMEOVER:
          track = null;
          break;
        case STATE.BATTLE:
          track = this.battle && this.battle.isBoss ? "boss" : "battle";
          break;
        default: {
          const map = this.player && this.player.pos ? getMap(this.player.pos.map) : null;
          track = map && map.music ? map.music : "field";
          break;
        }
      }
      if (track === null) {
        BGM.stop();
        return;
      }
      BGM.play(track);
    }
    _updateTitle(buttons, pointer) {
      const options = 2;
      if (buttons.includes("up")) this.titleIndex = (this.titleIndex - 1 + options) % options;
      if (buttons.includes("down")) this.titleIndex = (this.titleIndex + 1) % options;
      if (buttons.includes("confirm") || pointer) {
        if (pointer) {
          this.titleIndex = pointer.y < this.H * 0.74 ? 0 : 1;
        }
        if (this.titleIndex === 0) this.startNewGame();
        else this.continueGame();
      }
    }
    _updateName(buttons) {
      if (buttons.includes("confirm")) {
        this.finishNaming(this.nameInput || "ユウシャ");
      }
    }
    _updateField(buttons, pointer) {
      if (this.msg.active) {
        this._updateEvent(buttons, pointer);
        return;
      }
      if (buttons.includes("menu")) {
        this.menu.show();
        this.sm.set(STATE.MENU);
        return;
      }
      if (buttons.includes("confirm")) {
        this.tryTalk();
        return;
      }
      if (this.move) {
        this.move.progress += 1 / MOVE_FRAMES;
        if (this.move.progress >= 1) {
          this.finishMove();
          this._checkBossTrigger();
        }
        return;
      }
      let dir = null;
      if (this.input.isHeld("up")) dir = "up";
      else if (this.input.isHeld("down")) dir = "down";
      else if (this.input.isHeld("left")) dir = "left";
      else if (this.input.isHeld("right")) dir = "right";
      if (!dir && pointer) {
        const dxs = pointer.x - this.W / 2, dys = pointer.y - this.H / 2;
        if (Math.abs(dxs) > Math.abs(dys)) dir = dxs > 0 ? "right" : "left";
        else dir = dys > 0 ? "down" : "up";
      }
      if (dir) this.tryMove(dir);
    }
    _updateEvent(buttons, pointer) {
      if (this.msg.active) {
        if (this.msg.choices) {
          if (buttons.includes("up")) this.msg.moveChoice("up");
          if (buttons.includes("down")) this.msg.moveChoice("down");
          if (buttons.includes("confirm")) this.msg.advance();
        } else {
          if (buttons.includes("confirm") || buttons.includes("cancel") || pointer) this.msg.advance();
        }
        return;
      }
      if (this.sm.state === STATE.EVENT) this.sm.set(STATE.FIELD);
    }
    _updateMenu(buttons, pointer) {
      if (this.msg.active) {
        this._updateEvent(buttons, pointer);
        return;
      }
      if (!this.menu.open) {
        this.sm.set(STATE.FIELD);
        return;
      }
      this.menu.handleInput(buttons, pointer);
      if (!this.menu.open && !this.msg.active) this.sm.set(STATE.FIELD);
    }
    _updateShop(buttons, pointer) {
      if (!this.shop) {
        this.sm.set(STATE.FIELD);
        return;
      }
      this.shop.update();
      if (this.msg.active) {
        this._updateEvent(buttons, pointer);
        return;
      }
      this.shop.handleInput(buttons, pointer);
      if (!this.shop.open) {
        this.shop = null;
        this.sm.set(STATE.FIELD);
      }
    }
    _updateBattle(buttons, pointer) {
      if (!this.battle) {
        this.sm.set(STATE.FIELD);
        return;
      }
      this.battle.update();
      this.battle.handleInput(buttons, pointer);
      if (this.battle && this.battle.phase === "done") {
      }
    }
    _updateGameOver(buttons, pointer) {
      if (buttons.includes("confirm") || pointer) {
        this.reviveAfterGameOver();
      }
    }
    _updateEnding(buttons, pointer) {
      this.endingTimer++;
      if ((buttons.includes("confirm") || pointer) && this.endingTimer > 20) {
        this.endingPage++;
        this.endingTimer = 0;
        if (this.endingPage >= this.endingMsgs.length) {
          this.sm.set(STATE.TITLE);
          this.titleIndex = 0;
        }
      }
    }
    // ============ RENDER ============
    render() {
      const ctx = this.ctx, W = this.W, H = this.H;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
      switch (this.sm.state) {
        case STATE.TITLE:
          this._renderTitle();
          break;
        case STATE.NAME:
          this._renderName();
          break;
        case STATE.GAMEOVER:
          this._renderGameOver();
          break;
        case STATE.ENDING:
          this._renderEnding();
          break;
        case STATE.BATTLE:
          if (this.battle) this.battle.draw(ctx, W, H);
          break;
        default:
          this._renderWorld();
          break;
      }
      if (this.flashFx > 0) {
        ctx.fillStyle = `rgba(255,255,255,${this.flashFx / 24})`;
        ctx.fillRect(0, 0, W, H);
      }
    }
    _renderWorld() {
      const ctx = this.ctx, W = this.W, H = this.H;
      const p = this.player.pos;
      let drawX = p.x, drawY = p.y;
      if (this.move) {
        drawX = this.move.fromX + (this.move.toX - this.move.fromX) * this.move.progress;
        drawY = this.move.fromY + (this.move.toY - this.move.fromY) * this.move.progress;
      }
      const { camX, camY } = computeCamera(p.map, drawX, drawY, W, H);
      renderMap(ctx, p.map, camX, camY, W, H, this.player, this.frame);
      const px = drawX * TILE - camX, py = drawY * TILE - camY;
      drawSprite(ctx, "hero", p.dir, px, py, TILE);
      this._drawFieldHud();
      if (this.sm.state === STATE.MENU) this.menu.draw(ctx, W, H);
      if (this.sm.state === STATE.SHOP && this.shop) this.shop.draw(ctx, W, H);
      this.msg.draw(ctx, W, H);
    }
    _drawFieldHud() {
      if (this.sm.state === STATE.SHOP) return;
      const ctx = this.ctx, p = this.player;
      const x = 10, y = 10, w = 150, h = 70;
      drawWindow(ctx, x, y, w, h);
      ctx.fillStyle = "#fff";
      ctx.font = '14px "MS Gothic", monospace';
      ctx.textAlign = "left";
      ctx.textBaseline = "top";
      ctx.fillText(`${p.name}  Lv${p.lv}`, x + 10, y + 8);
      ctx.fillStyle = hpColor(p.hp, p.maxHp);
      ctx.fillText(`HP ${p.hp}/${p.maxHp}`, x + 10, y + 27);
      ctx.fillStyle = "#fff";
      ctx.fillText(`MP ${p.mp}/${p.maxMp}  ${p.gold}G`, x + 10, y + 46);
    }
    _renderTitle() {
      const ctx = this.ctx, W = this.W, H = this.H;
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#0a0a2a");
      g.addColorStop(1, "#1a0a1a");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#fff";
      for (let i = 0; i < 40; i++) {
        const sx = i * 97 % W, sy = i * 53 % (H / 2);
        const tw = (Math.sin(this.frame / 20 + i) + 1) / 2;
        ctx.globalAlpha = 0.3 + tw * 0.7;
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#400";
      ctx.beginPath();
      ctx.ellipse(W / 2, H * 0.36, 90, 60, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#a00";
      ctx.fillRect(W / 2 - 30, H * 0.32, 8, 8);
      ctx.fillRect(W / 2 + 22, H * 0.32, 8, 8);
      ctx.textAlign = "center";
      ctx.fillStyle = "#e0d040";
      ctx.font = 'bold 52px "MS Gothic", serif';
      ctx.fillText(STR.gameTitle, W / 2, H * 0.5);
      ctx.fillStyle = "#fff";
      ctx.font = '22px "MS Gothic", serif';
      ctx.fillText(STR.gameSubtitle, W / 2, H * 0.6);
      const hasSave = SaveManager.hasSave();
      ctx.font = '24px "MS Gothic", monospace';
      const items = [STR.title.newGame, STR.title.continue];
      items.forEach((it, i) => {
        const oy = H * 0.72 + i * 40;
        if (i === this.titleIndex) ctx.fillStyle = "#e0d040";
        else if (i === 1 && !hasSave) ctx.fillStyle = "#666";
        else ctx.fillStyle = "#fff";
        ctx.fillText((i === this.titleIndex ? "▶ " : "") + it, W / 2, oy);
      });
      ctx.fillStyle = "#88a";
      ctx.font = '14px "MS Gothic", monospace';
      if (Math.floor(this.frame / 30) % 2 === 0) ctx.fillText(STR.title.pressStart, W / 2, H * 0.9);
      ctx.fillStyle = "#6a6a88";
      ctx.font = '13px "MS Gothic", monospace';
      ctx.fillText(STR.title.fileHelp, W / 2, H * 0.96);
      ctx.textAlign = "left";
    }
    _renderName() {
      const ctx = this.ctx, W = this.W, H = this.H;
      ctx.fillStyle = "#101028";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.font = '24px "MS Gothic", monospace';
      ctx.fillText(STR.title.askName, W / 2, H * 0.35);
      const boxW = 320, boxH = 60, boxX = W / 2 - boxW / 2, boxY = Math.round(H * 0.45);
      drawWindow(ctx, boxX, boxY, boxW, boxH);
      const shown = (this.nameInput || "ユウシャ") + (Math.floor(performance.now() / 400) % 2 ? "｜" : "");
      ctx.fillStyle = "#e0d040";
      let fs = 28;
      ctx.font = `${fs}px "MS Gothic", monospace`;
      while (ctx.measureText(shown).width > boxW - 32 && fs > 14) {
        fs -= 2;
        ctx.font = `${fs}px "MS Gothic", monospace`;
      }
      const prevBaseline = ctx.textBaseline;
      ctx.textBaseline = "middle";
      ctx.fillText(shown, W / 2, boxY + boxH / 2 + 1);
      ctx.textBaseline = prevBaseline;
      ctx.fillStyle = "#88a";
      ctx.font = '15px "MS Gothic", monospace';
      ctx.fillText("なまえを にゅうりょくして Enter（くうらんで ユウシャ）", W / 2, boxY + boxH + 34);
      ctx.textAlign = "left";
    }
    _renderGameOver() {
      const ctx = this.ctx, W = this.W, H = this.H;
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.fillStyle = "#a00";
      ctx.font = 'bold 48px "MS Gothic", serif';
      ctx.fillText(STR.common.gameOver, W / 2, H * 0.42);
      ctx.fillStyle = "#fff";
      ctx.font = '18px "MS Gothic", monospace';
      if (Math.floor(this.frame / 30) % 2 === 0)
        ctx.fillText("クリックか Enterで 城へ もどる", W / 2, H * 0.6);
      ctx.textAlign = "left";
    }
    _renderEnding() {
      const ctx = this.ctx, W = this.W, H = this.H;
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#fdf3c0");
      g.addColorStop(1, "#f0a060");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      drawSprite(ctx, "hero", "down", W / 2 - 50, H * 0.3, 48);
      drawSprite(ctx, "princess", "down", W / 2 + 4, H * 0.3, 48);
      drawWindow(ctx, 40, H - 160, W - 80, 130);
      ctx.fillStyle = "#fff";
      ctx.font = '22px "MS Gothic", monospace';
      ctx.textAlign = "left";
      const msg = this.endingMsgs[Math.min(this.endingPage, this.endingMsgs.length - 1)];
      const lines = msg.split("\n");
      lines.forEach((l, i) => ctx.fillText(l, 64, H - 140 + i * 28));
      if (Math.floor(this.frame / 30) % 2 === 0) {
        ctx.fillStyle = "#e0d040";
        ctx.fillText("▼", W - 70, H - 60);
      }
      ctx.textAlign = "left";
    }
  };

  // src/main.js
  window.addEventListener("DOMContentLoaded", async () => {
    const canvas = document.getElementById("game");
    await AssetManager.preload();
    const game = new Game(canvas);
    window.addEventListener("keydown", (e) => {
      if (game.sm.state !== STATE.NAME) return;
      if (e.key === "Backspace") {
        game.nameInput = game.nameInput.slice(0, -1);
        e.preventDefault();
      } else if (e.key === "Enter") {
      } else if (e.key.length === 1 && game.nameInput.length < 6 && !["z", "x"].includes(e.key)) {
        game.nameInput += e.key;
      }
    });
    window.addEventListener("keydown", (e) => {
      if (game.sm.state !== STATE.TITLE) return;
      if (e.code === "KeyE") {
        e.preventDefault();
        game.exportSave();
      } else if (e.code === "KeyI") {
        e.preventDefault();
        game.importSave();
      }
    });
    const engine = new Engine(
      (dt, frame) => game.update(dt, frame),
      () => game.render()
    );
    engine.start();
    window.__game = game;
  });
})();

  </script>
